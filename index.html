<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Start Menu</title>

<style>

/* ===== PAGE BACKGROUND ===== */

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;

background:linear-gradient(-45deg,#0044ff,#001f6b,#0066ff,#000c3a);
background-size:400% 400%;
animation:bgmove 10s ease infinite;
}

@keyframes bgmove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* ===== ABSTRACT SHAPES ===== */

.shape{
position:absolute;
border-radius:50%;
opacity:0.25;
filter:blur(12px);
animation:float 8s infinite ease-in-out;
}

.shape1{
width:260px;
height:260px;
background:#6aa6ff;
top:8%;
left:12%;
}

.shape2{
width:320px;
height:320px;
background:white;
bottom:8%;
right:12%;
}

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-40px);}
}

/* ===== CONTAINER ===== */

.container{
display:flex;
gap:40px;
z-index:2;
}

/* ===== GAME CARD (SKEUOMORPHIC) ===== */

.game-card{
width:240px;
border-radius:18px;
overflow:hidden;
position:relative;
background:#e8ecff;

box-shadow:
0 12px 25px rgba(0,0,0,0.45), /* outer shadow */
inset 0 2px 3px rgba(255,255,255,0.6), /* top highlight */
inset 0 -3px 6px rgba(0,0,0,0.25); /* inner depth */

transition:transform 0.3s;
}

/* image styling */

.game-card img{
width:100%;
height:160px;
object-fit:cover;
display:block;

box-shadow:
0 8px 18px rgba(0,0,0,0.5); /* shadow behind image */
}

/* ===== HOVER GRADIENT ===== */

.overlay{
position:absolute;
bottom:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(to top, rgba(0,0,0,0.9), rgba(0,0,0,0));
opacity:0;
transition:opacity 0.3s;
}

/* ===== GAME NAME ===== */

.game-name{
position:absolute;
bottom:15px;
left:50%;
transform:translateX(-50%);
color:white;
font-size:20px;
font-weight:bold;
opacity:0;
transition:opacity 0.3s;
}

/* ===== HOVER EFFECT ===== */

.game-card:hover{
transform:scale(1.08);
}

.game-card:hover .overlay{
opacity:1;
}

.game-card:hover .game-name{
opacity:1;
}

a{
text-decoration:none;
}

/* ===== SECRET BUTTON ===== */

#secretButton{
position:fixed;
bottom:15px;
right:15px;
background:black;
color:white;
border:none;
padding:10px 14px;
border-radius:6px;
cursor:pointer;
font-size:14px;
}

</style>

</head>

<body>

<div class="shape shape1"></div>
<div class="shape shape2"></div>

<div class="container">

<!-- GAME 1 -->

<a href="mine-clone.html">
<div class="game-card">

<img src="mine-clone.png" alt="Mine Clone">

<div class="overlay"></div>
<div class="game-name">Mine Clone</div>

</div>
</a>

<!-- GAME 2 -->

<a href="hcmb.html">
<div class="game-card">

<img src="hill climb.png" alt="Hill Racing">

<div class="overlay"></div>
<div class="game-name">Hill Racing</div>

</div>
</a>

</div>

<button id="secretButton" onclick="entercode()">dont click</button>

<script>

function enterSecret(){

let code = prompt("Enter Secret Code");

if(code === "zomshoot"){
window.location.href = "vood.png";
}
else{
alert("Wrong Code");
}

}

</script>

</body>
</html>
