<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Voxel World</title>
<style>
  /* TOUCH UI */

#touch-ui{
position:fixed;
inset:0;
pointer-events:none;
font-family:Arial;
}

/* joystick */

#joystick{
position:absolute;
bottom:40px;
left:40px;
width:120px;
height:120px;
border-radius:50%;
background:rgba(0,0,0,0.35);
pointer-events:auto;
}

#stick{
position:absolute;
left:40px;
top:40px;
width:40px;
height:40px;
border-radius:50%;
background:white;
}

/* look area */

#touch-look{
position:absolute;
right:0;
top:0;
width:50%;
height:100%;
pointer-events:auto;
}

/* buttons */

#jumpBtn,#breakBtn,#placeBtn{
position:absolute;
right:40px;
width:80px;
height:40px;
border:none;
border-radius:10px;
background:rgba(0,0,0,0.6);
color:white;
pointer-events:auto;
}

#jumpBtn{ bottom:120px; }
#breakBtn{ bottom:70px; }
#placeBtn{ bottom:20px; }
body { margin:0; overflow:hidden; background:#87ceeb; }
canvas { display:block; }

#crosshair{
  position:fixed;
  left:50%; top:50%;
  width:14px; height:14px;
  transform:translate(-50%,-50%);
  pointer-events:none;
}
#crosshair::before,#crosshair::after{
  content:"";
  position:absolute;
  background:white;
}
#crosshair::before{ left:6px; top:0; width:2px; height:14px; }
#crosshair::after{ top:6px; left:0; width:14px; height:2px; }

#hotbar{
  position:fixed; bottom:10px; left:50%;
  transform:translateX(-50%);
  display:flex; gap:5px;
}
.hotbar-slot{
  width:40px; height:40px;
  border:2px solid white;
  background:rgba(0, 0, 0, 0.4);
}
.hotbar-slot.active{ border-color:yellow; }

#start{
  position:fixed; inset:0;
  display:flex; align-items:center; justify-content:center;
  background:rgba(0,0,0,0.6);
  color:white; font-size:32px;
  cursor:pointer; z-index:10;
  font-family:Arial;
}
</style>
</head>
<body>

<div id="start">CLICK TO START</div>
<div id="crosshair"></div>
<div id="hotbar">
  <div class="hotbar-slot active"></div>
  <div class="hotbar-slot"></div>
  <div class="hotbar-slot"></div>
  <div class="hotbar-slot"></div>
  <div class="hotbar-slot"></div>
</div>

<div id="touch-ui">

<div id="joystick">
<div id="stick"></div>
</div>

<div id="touch-look"></div>

<button id="jumpBtn">JUMP</button>
<button id="breakBtn">BREAK</button>
<button id="placeBtn">PLACE</button>

</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
<script src="script.js"></script>

<script>
</script>
</body>
</html>
